# Acme Forge — CI Self-validation (DOGFOODING)
#
# Este workflow é a aplicação literal de `templates/cicd/github-actions-validate.template.yml`
# AO PRÓPRIO repo canônico do Forge. Garante que o framework passa nos próprios gates
# que distribui aos consumidores. Adicionado em v0.13.0 (F33-Sprint1).
#
# Diferenças vs template canônico:
#   - PROJECT_NAME = agent-governance-framework
#   - FORGE_ROOT = . (este repo É o Forge)
#   - skill-security-scan roda sempre (não condicionado a mudanças)
#   - pre-merge-check pulado (canônico não tem src/skus/, src/agents/ produtivos)
#   - tdd-red-phase-check pulado (canônico não consome AIOS; valida que o template existe)
#   - forge-doctor roda em modo --canonical explícito
#
# PRINCÍPIOS: C6 (auditável via Actions log), C7 (sem hardcode — usa o próprio script publicado)

name: Forge Validate (dogfooding)

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  forge-doctor:
    name: Forge Doctor — canonical mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run forge-doctor.sh --canonical
        run: bash scripts/forge-doctor.sh --canonical

  skill-security-scan:
    name: Skill Security Scan (S1-S5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan .claude/skills/
        run: bash hooks/scripts/skill-security-scan.sh

  manifest-json-valid:
    name: Manifest JSON valido
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse manifest.json + asset reviewer/*.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('docs/forge/manifest.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('reviewer/output-schema.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('reviewer/validation-rules.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude/settings.json','utf8'))"
          echo "All JSON files parsed successfully"

  hooks-bash-syntax:
    name: Hooks bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n em todos os hooks
        run: |
          fails=0
          while IFS= read -r -d '' hook; do
            if ! bash -n "$hook" 2>/dev/null; then
              echo "::error::Sintaxe inválida em $hook"
              fails=$((fails+1))
            fi
          done < <(find hooks -name '*.sh' -print0)
          if [ "$fails" -gt 0 ]; then
            echo "::error::$fails hook(s) com sintaxe inválida"
            exit 2
          fi
          echo "✓ Todos os hooks com sintaxe válida"

  summary:
    name: Resumo CI
    runs-on: ubuntu-latest
    needs: [forge-doctor, skill-security-scan, manifest-json-valid, hooks-bash-syntax]
    if: always()
    steps:
      - name: Status consolidado
        run: |
          echo "forge-doctor:        ${{ needs.forge-doctor.result }}"
          echo "skill-security-scan: ${{ needs.skill-security-scan.result }}"
          echo "manifest-json-valid: ${{ needs.manifest-json-valid.result }}"
          echo "hooks-bash-syntax:   ${{ needs.hooks-bash-syntax.result }}"
          if [[ "${{ needs.forge-doctor.result }}" != "success" ]] || \
             [[ "${{ needs.skill-security-scan.result }}" != "success" ]] || \
             [[ "${{ needs.manifest-json-valid.result }}" != "success" ]] || \
             [[ "${{ needs.hooks-bash-syntax.result }}" != "success" ]]; then
            exit 1
          fi
